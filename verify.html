<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Certificate Verification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0a0f1c, #111a2e);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 500px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .checkmark {
      font-size: 60px;
      color: #00ff9c;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      margin: 10px 0;
      font-size: 28px;
      color: #00ff9c;
    }

    .details {
      margin-top: 20px;
      text-align: left;
    }

    .details p {
      margin: 8px 0;
      font-size: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 5px;
    }

    .label {
      color: #aaa;
    }

    .value {
      float: right;
      color: #fff;
      font-weight: 600;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>

<body>

<div class="container">
  
  <div class="checkmark">✔</div>
  <h1>Certificate Verified</h1>

  <div class="details">
    <p><span class="label">Player Name:</span> <span class="value">ARITRA MONDAL</span></p>
    <p><span class="label">Tournament:</span> <span class="value">FFMSW 2026</span></p>
    <p><span class="label">Role:</span> <span class="value">PRIMARY RUSHER</span></p>
    <p><span class="label">Position:</span> <span class="value">Winner</span></p>
    <p><span class="label">Certificate ID:</span> <span class="value"> FFMSW-FINAL-2026</span></p>
    <p><span class="label">Date of issue:</span> <span class="value">23 April 2026</span></p>
  </div>

  <div class="footer">
    Official Verification Portal
  </div>

</div>

</body>
</html>
